<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centenarian Decathlon · Reference &amp; Dashboard | Early Medical®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   EARLY MEDICAL BRAND  (from generator design rules)
   DARK_BG #3E4555 · navy #1E2D38 · CORAL #bc2a2a · TEAL #2563eb
   Headings Cormorant Garamond · body Calibri
   Activity slide = 16:9 (10 × 5.625") so it drops into Canva.
   ───────────────────────────────────────────────────────────── */
:root{
  --slate:#ffffff; --slate-2:#f1f3f5; --navy:#ffffff; --navy-2:#ffffff;
  --coral:#bc2a2a; --teal:#2563eb; --cream:#39404b; --white:#1a1f2b;
  --ink:#39404b; --muted:#64748b;
  --ok:#10b981; --ok-soft:#a7f3d0; --warn:#d97706; --gap:#bc2a2a;
  --line:rgba(15,23,42,.1);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Avenir','Avenir Next',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:#eef1f4;color:var(--ink);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}

/* ── Top app bar (UI chrome, not part of the slide) ── */
.appbar{display:flex;align-items:center;gap:18px;padding:12px 22px;background:var(--navy);
  color:var(--cream);border-bottom:1px solid var(--line)}
.brandmark{font-family:var(--serif);font-size:22px;letter-spacing:.5px;font-weight:600}
.brandmark span{color:var(--coral)}
.appbar .spacer{flex:1}
.seg{display:inline-flex;background:rgba(15,23,42,.05);border-radius:999px;padding:3px}
.seg button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.3px;
  color:var(--cream);background:transparent;border:0;padding:7px 16px;border-radius:999px;cursor:pointer}
.seg button.on{background:var(--coral);color:#fff}
.patient-chip{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--cream)}
.patient-chip .nm{font-weight:700}
.patient-chip .meta{color:var(--muted)}

/* ── Layout: catalog rail + stage ── */
.shell{display:flex;flex:1;min-height:0}
.rail{width:248px;flex:0 0 248px;background:var(--navy-2);color:var(--cream);
  padding:16px 12px;overflow:auto;border-right:1px solid var(--line)}
.rail h4{font-family:var(--sans);text-transform:uppercase;letter-spacing:1.5px;font-size:11px;
  color:var(--muted);margin:6px 8px 12px}
.actbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
  border:0;color:var(--cream);padding:11px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;
  font-family:var(--sans);line-height:1.25;margin-bottom:2px}
.actbtn:hover{background:rgba(15,23,42,.04)}
.actbtn.on{background:var(--coral);color:#fff}
.actbtn.soon{opacity:.45;cursor:default}
.actbtn .ring{flex:0 0 26px;height:26px;border-radius:50%;display:grid;place-items:center;
  font-size:12px;font-weight:800;border:2px solid currentColor}
.actbtn.z-clear .ring{color:#059669} .actbtn.z-borderline .ring{color:#d97706} .actbtn.z-gap .ring{color:#bc2a2a}
.actbtn.on .ring{color:#fff}
.actbtn .lbl{flex:1}
.actbtn .pct{font-size:11px;color:#64748b}
.actbtn.on .pct{color:rgba(255,255,255,.9)}
.rail .addnote{margin:14px 8px;font-size:11.5px;color:var(--muted);line-height:1.5}

.stage{flex:1;min-width:0;overflow:auto;padding:24px;display:flex;justify-content:center;align-items:flex-start}

/* ── The brandable slide (≈16:9 presence, grows with content) ── */
.slide{width:100%;max-width:1024px;min-width:0;min-height:560px;background:var(--slate);color:var(--cream);
  border-radius:14px;box-shadow:0 24px 60px rgba(15,23,42,.12);overflow:hidden;display:flex;flex-direction:column;
  position:relative}
.slide-head{padding:20px 30px 14px;border-bottom:1px solid var(--line)}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--coral);font-weight:700}
.slide-title{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1.05;margin:4px 0 0}
.slide-sub{font-size:13px;color:var(--muted);margin-top:5px;max-width:80%}
.head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:20px}
.readiness{text-align:right;flex:0 0 auto}
.readiness .big{font-family:var(--serif);font-size:27px;line-height:1.05;font-weight:600}
.readiness .big.r-gap{color:#bc2a2a} .readiness .big.r-bord{color:#d97706} .readiness .big.r-clear{color:#059669}
.readiness .cap{font-size:10.5px;color:var(--muted);margin-top:3px;max-width:240px;margin-left:auto;line-height:1.35}
.readiness .cap2{font-size:10px;color:var(--muted);opacity:.8;margin-top:3px}

/* category coverage chips */
.cov{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.cov .chip{font-size:10.5px;letter-spacing:.4px;padding:4px 9px;border-radius:999px;
  border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;gap:5px}
.cov .chip.active{color:var(--cream);border-color:var(--teal)}
.cov .chip b{font-weight:700}

/* requirement rows */
.rows{flex:1;overflow:visible;padding:10px 30px 8px}
.req{display:grid;grid-template-columns:188px 1fr 232px;gap:16px;align-items:center;
  padding:11px 0;border-bottom:1px solid rgba(15,23,42,.045)}
.req:last-child{border-bottom:0}
.req .q{min-width:0}
.req .qcat{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700}
.qcat.Mobility{color:var(--teal)} .qcat.Strength{color:var(--coral)}
.qcat.Power{color:#9333ea} .qcat.Aerobic{color:#0891b2}
.qcat.Eccentric{color:#d97706} .qcat.Balance{color:#4d7c0f}
.qcat.Core{color:#6d28d9} .qcat.Endurance{color:#a16207}
.req .qlbl{font-size:14px;font-weight:600;color:var(--white);margin-top:2px;line-height:1.2}
.req .src{font-size:11px;color:var(--muted);margin-top:3px}
.badge{display:inline-block;font-size:9.5px;letter-spacing:.4px;padding:1.5px 6px;border-radius:4px;
  font-weight:700;vertical-align:middle;margin-left:6px}
.badge.confirmed{background:rgba(16,185,129,.18);color:#059669;border:1px solid rgba(16,185,129,.4)}
.badge.modeled{background:rgba(217,119,6,.15);color:#d97706;border:1px solid rgba(217,119,6,.4)}
.badge.coachset{background:rgba(188,42,42,.18);color:#bc2a2a;border:1px solid rgba(188,42,42,.45)}

/* gap track */
.track{position:relative;height:46px}
.bar{position:absolute;left:0;right:0;top:27px;height:6px;border-radius:3px;background:rgba(15,23,42,.1)}
.bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:linear-gradient(90deg,var(--teal),#0891b2);opacity:.55}
.mk{position:absolute;transform:translateX(-50%);top:6px;text-align:center}
.mk .dot{width:14px;height:14px;border-radius:50%;margin:0 auto;border:2.5px solid var(--slate)}
.mk.now .dot{background:var(--white)}
.mk.goal .dot{background:transparent;border-color:var(--cream);width:2px;height:20px;border-radius:0;border-left:2px dashed var(--cream)}
.mk.back .dot{background:var(--warn)}
.mk .tag{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap}
.mk.now .tag{color:var(--white);font-weight:700}
.mk.back .tag{color:var(--warn)}
.req.qual .track{display:flex;align-items:center;color:var(--muted);font-size:12px;font-style:italic}

/* numbers column */
.nums{display:flex;gap:8px;justify-content:flex-end}
.cell{flex:1;max-width:70px;text-align:center;padding:6px 4px;border-radius:8px;background:rgba(15,23,42,.03)}
.cell .v{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1}
.cell .k{font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.cell.now{background:rgba(15,23,42,.06)}
.cell.status-gap{box-shadow:inset 0 0 0 1.5px var(--gap)}
.cell.status-warn{box-shadow:inset 0 0 0 1.5px var(--warn)}
.cell.status-ok{box-shadow:inset 0 0 0 1.5px var(--ok)}
.cell .v.gap{color:#bc2a2a} .cell .v.warn{color:#d97706} .cell .v.ok{color:#059669}

/* reference mode: show the "why" */
.why{grid-column:1/-1;font-size:12px;color:#475569;line-height:1.5;padding:2px 0 4px;
  border-left:2px solid var(--teal);padding-left:12px;margin-top:2px;display:none}
body.ref .why{display:block}
body.ref .req{grid-template-columns:188px 1fr 232px}
.why .evi{color:var(--muted);font-style:italic}

/* footer band */
.foot{margin-top:auto;background:#f8fafc;border-top:1px solid var(--line);display:flex;align-items:center;
  justify-content:space-between;padding:9px 30px;font-size:11px;letter-spacing:1px}
.foot .em{font-family:var(--serif);font-size:15px;color:var(--cream)}
.foot .pillars{display:flex;gap:18px;text-transform:uppercase;color:var(--muted);font-weight:600}
.foot .pillars .on{color:var(--coral)}

/* legend under slide */
.legend{max-width:1024px;margin:14px auto 30px;display:flex;gap:22px;flex-wrap:wrap;
  font-size:12px;color:#475569;align-items:center;justify-content:center}
.legend .it{display:flex;align-items:center;gap:7px}
.sw{width:13px;height:13px;border-radius:50%;display:inline-block}
.sw.now{background:#fff} .sw.req{width:2px;height:15px;border-radius:0;border-left:2px dashed #475569;background:transparent}
.sw.back{background:var(--warn)}
.legend .note{flex-basis:100%;text-align:center;color:var(--muted);font-size:11px}
.actbtn.pend{opacity:.55} .actbtn.pend:hover{opacity:.8}
.addgoal{margin:10px 6px 4px;width:calc(100% - 12px);background:rgba(37,99,235,.14);border:1px dashed var(--teal);
  color:var(--cream);padding:10px;border-radius:9px;cursor:pointer;font-size:13px;font-family:var(--sans)}
.addgoal:hover{background:rgba(37,99,235,.24)}

/* ── radar patient view (matches the Functional Capacity Profile mock) ── */
.pv{padding:12px 26px 6px;display:flex;flex-direction:column;gap:12px;flex:1}
.pv-top{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;align-items:start}
.radarwrap{display:flex;justify-content:center;padding-top:2px}
.radarwrap svg{width:100%;max-width:430px;height:auto}
.bchartwrap{padding-top:2px}
.bchart{display:flex;flex-direction:column;gap:8px}
.bscale{position:relative;height:13px;margin:0 42px 1px 146px;font-size:9px;color:var(--muted)}
.bscale span{position:absolute;transform:translateX(-50%);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.brow{display:grid;grid-template-columns:138px 1fr 40px;gap:8px;align-items:center}
.blabel{display:flex;align-items:center;gap:5px;min-width:0;font-size:11.5px}
.blabel .bnm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--cream)}
.zico{font-size:10px;flex:0 0 auto;font-weight:700}
.zico.z-clear{color:#059669} .zico.z-borderline{color:#d97706} .zico.z-gap{color:#bc2a2a}
.btrack{position:relative;height:18px;background:rgba(15,23,42,.045);border-radius:5px;overflow:hidden}
.bband{position:absolute;top:0;bottom:0;background:rgba(217,119,6,.17)}
.bproj{position:absolute;top:0;bottom:0;left:0;border-radius:5px 0 0 5px}
.bproj.z-clear{background:#10b981} .bproj.z-borderline{background:#d97706} .bproj.z-gap{background:#bc2a2a}
.bthr{position:absolute;top:-2px;bottom:-2px;width:2px;background:#10b981;z-index:3}
.bcur{position:absolute;top:-3px;bottom:-3px;width:2px;background:#2563eb;z-index:4;box-shadow:0 0 0 1px rgba(255,255,255,.85)}
.bval{font-size:11px;font-weight:700;text-align:right}
.bval.z-clear{color:#059669} .bval.z-borderline{color:#d97706} .bval.z-gap{color:#bc2a2a}
.rdisc{font-size:9px;color:var(--muted);font-style:italic;margin-top:3px;letter-spacing:.2px}
.missnote{background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.3);color:#b45309;border-radius:9px;padding:9px 13px;font-size:11.5px;line-height:1.4;margin-bottom:6px}
.rgrid{fill:none;stroke:rgba(15,23,42,.06)}
.raxis{stroke:rgba(15,23,42,.1)}
.rlabel{fill:var(--cream);font-size:11px;font-family:var(--sans)}
.rtick{fill:var(--muted);font-size:9px;font-family:var(--sans)}
.rcur{fill:rgba(37,99,235,.16);stroke:#2563eb;stroke-width:2}
.rproj{fill:none;stroke:#bc2a2a;stroke-width:2;stroke-dasharray:5 4}
.rthr{fill:none;stroke:#10b981;stroke-width:2}
.rband{fill:none;stroke:rgba(217,119,6,.32);stroke-width:1;stroke-dasharray:2 3}
.rprojband{fill:rgba(188,42,42,.15);stroke:none}
.radarsec{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);text-align:center}
.radarttl{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:2px}
.radarsub{font-size:10.5px;font-weight:400;color:var(--muted);letter-spacing:.2px}
.radarwrap{max-width:470px;margin:8px auto 0}
.radarwrap svg{width:100%;height:auto;overflow:visible}
.takeaway{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);font-size:14.5px;line-height:1.5;color:var(--ink);max-width:820px}
.takeaway b{font-weight:700}
.takeaway .tk{color:var(--coral);font-weight:700}
.dtlsum{cursor:pointer;font-size:12px;font-weight:700;color:var(--coral);padding:7px 0;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.dtlsum::-webkit-details-marker{display:none}
.dtlsum::before{content:'▸';font-size:9px;color:var(--coral);transition:transform .15s}
details[open]>.dtlsum::before{transform:rotate(90deg)}
.dtlhint{font-weight:400;color:var(--muted);font-size:10.5px}
.dtl{margin-top:14px;padding-top:2px;border-top:1px solid var(--line)}
.legdtl>.dtlsum{padding:3px 0}
.ckey{display:flex;flex-wrap:wrap;gap:5px 16px;align-items:center;font-size:11px;color:var(--muted);padding:2px 2px 4px;margin-bottom:2px}
.ckey>span{display:inline-flex;align-items:center;gap:7px}
.ckey .ln{flex:0 0 20px;height:0;border-top:3px solid;margin:0}
.refsearch{width:100%;box-sizing:border-box;margin:0 0 9px;padding:7px 11px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:12.5px;color:var(--ink);background:#fff}
.refsearch:focus{outline:none;border-color:var(--coral)}
.refsearch::placeholder{color:var(--muted)}
.dchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.dchip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px 3px 7px;border-radius:999px;background:rgba(15,23,42,.04);border:1px solid var(--line)}
.dchip .dd{width:6px;height:6px;border-radius:50%;background:currentColor}
.refgroup{margin-bottom:3px}
.refghead{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:13px 6px 4px;opacity:.85}
.refgroup:first-child .refghead{margin-top:2px}
.catin{font-family:var(--sans);font-size:13px;padding:7px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);min-width:240px;margin-top:2px}
.catin:focus{outline:none;border-color:var(--coral)}
.libchk{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--ink);cursor:pointer;margin-top:4px}
.libchk input{width:16px;height:16px;margin-top:1px;accent-color:var(--coral);flex:0 0 auto}
.libchk b{font-weight:600}
.libchk .d{display:block;color:var(--muted);font-size:11.5px;margin-top:2px;font-weight:400}
.oneoffgrp .refghead{color:var(--warn)}
.refradarwrap{max-width:520px;margin:10px auto 22px}
.refradar{width:100%;height:auto;overflow:visible}
.refrthr{fill:rgba(16,185,129,.09);stroke:#10b981;stroke-width:2}
.refrlbl{font-family:var(--sans);font-size:11.5px;font-weight:700}
.refrval{fill:var(--muted);font-size:10.5px;font-weight:600}
.refrc1{fill:#059669;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.5px}
.refrc2{fill:var(--muted);font-family:var(--sans);font-size:10px;letter-spacing:.5px}
.side{display:flex;flex-direction:column;gap:11px}
.lbox{background:rgba(15,23,42,.025);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.lrow{display:flex;gap:10px;font-size:12px;margin:7px 0;line-height:1.3}
.lrow .ln{flex:0 0 22px;height:0;border-top:3px solid;margin-top:7px}
.ln.cur{border-color:#2563eb} .ln.proj{border-color:#bc2a2a;border-top-style:dashed} .ln.thr{border-color:#10b981}
.lrow b{color:var(--white);font-weight:600} .lrow .d{color:var(--muted);font-size:11px}
.statusttl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:2px 0 6px}
.srow{display:flex;align-items:center;gap:7px;background:rgba(15,23,42,.025);border:1px solid var(--line);
  border-radius:8px;padding:6px 10px;margin:5px 0;font-size:12px}
.srow.z-gap{background:rgba(188,42,42,.10);border-color:rgba(188,42,42,.28)}
.srow.z-borderline{background:rgba(217,119,6,.10);border-color:rgba(217,119,6,.28)}
.srow.z-clear{background:rgba(16,185,129,.09);border-color:rgba(16,185,129,.22)}
.srow .nm{color:var(--white);font-weight:600} .srow .df{margin-left:auto;font-weight:600}
.srow.z-gap .df{color:#bc2a2a} .srow.z-borderline .df{color:#d97706} .srow.z-clear .df{color:#059669}
.cdot{font-size:9px;line-height:1;flex:0 0 auto}
.cdot.direct{color:#059669} .cdot.proxy{color:#d97706} .cdot.extrapolated{color:#94a3b8}
.pcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;padding:2px 0 8px}
.pcard{background:rgba(15,23,42,.025);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.pcard .ct{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.pcard .big{font-family:var(--serif);font-size:13px;color:var(--muted);margin:4px 0 2px}
.pcard .big .n{font-size:23px;color:var(--white)} .pcard .big .p{font-size:21px;color:#bc2a2a}
.pbar{height:6px;border-radius:3px;background:rgba(15,23,42,.1);position:relative;margin:8px 0 6px}
.pbar .f{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:#bc2a2a}
.pbar .t{position:absolute;top:-3px;width:2px;height:12px;background:#10b981;z-index:2}
.pbar .band{position:absolute;top:0;bottom:0;border-radius:3px;background:rgba(217,119,6,.20)}
.pcard.z-clear .pbar .f{background:#10b981} .pcard.z-borderline .pbar .f{background:#d97706}
.pcard.z-clear{border-color:rgba(16,185,129,.30)} .pcard.z-borderline{border-color:rgba(217,119,6,.30)} .pcard.z-gap{border-color:rgba(188,42,42,.30)}
.pcard .cap{font-size:10.5px;color:var(--muted);line-height:1.4}
.pcard .cap.warn{color:#bc2a2a;font-weight:600}
.pcard .cap.bord{color:#d97706;font-weight:600} .pcard .cap.ok2{color:#059669;font-weight:600}
.pcard .rng{font-size:9.5px;color:var(--muted);opacity:.8;margin-top:2px;font-style:italic}
.pcard .raw{font-size:10px;color:var(--muted);margin-top:3px;opacity:.85}
.cardwhy{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:11.5px;color:#475569;line-height:1.45}
.cardwhy .evi{color:var(--muted);font-style:italic}
body.ref .cardwhy{display:block}
body.ref .pcards{grid-template-columns:1fr}
body.ref .radarwrap{display:none}
body.ref .pv-top{grid-template-columns:1fr}
.qnote{font-size:11.5px;color:var(--muted);font-style:italic;padding:2px 0 4px}
.pending-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:26px;text-align:center}
.pending-box .pt{font-family:var(--serif);font-size:22px;color:var(--cream)}

<script>
/* ══════════════════════════════════════════════════════════════
   1) BACKCASTING ENGINE  - ported from generator.py
   EM sex × decade strength-decline synthesis (norm_tables.py:216)
   annual % performance loss; walk a reserve back from age 90 → now.
   ══════════════════════════════════════════════════════════════ */
const DECLINE = {
  male:[ {min:0,max:39,annual:1.0},{min:40,max:49,annual:1.1},{min:50,max:59,annual:1.5},
         {min:60,max:69,annual:1.9},{min:70,max:79,annual:3.6},{min:80,max:120,annual:4.0} ],
  female:[ {min:0,max:39,annual:0.95},{min:40,max:49,annual:1.55},{min:50,max:59,annual:3.1},
           {min:60,max:69,annual:2.2},{min:70,max:79,annual:2.9},{min:80,max:120,annual:3.45} ]
};
const rateFor=(sex,age)=>{const b=(DECLINE[sex]||DECLINE.male).find(b=>age>=b.min&&age<=b.max);return (b?b.annual:1.0)/100;};
// "How high must I be NOW to still clear `reserve` at age 90, given my decline curve?"
// Strength/power → age-stepped sex×decade walk. Aerobic etc. → flat rate from a
// quality-specific per-decade % (VO₂ has no strength age-bands).
function backcastNow(sex, ageNow, reserve, dir='higher_better', target=90, declinePctPerDecade=null){
  if(declinePctPerDecade){
    const annual = 1-Math.pow(1-declinePctPerDecade/100, 0.1);
    const mult = Math.pow(1-annual, target-ageNow);
    return dir==='lower_better' ? reserve*mult : reserve/mult;
  }
  let v=reserve;
  for(let y=target; y>ageNow; y--){ const r=rateFor(sex,y-1); v = dir==='lower_better' ? v*(1-r) : v/(1-r); }
  return v;
}

/* ══════════════════════════════════════════════════════════════
   2) PATIENT  - sample inputs (this is what the live app will inject
      from the patient JSON / VALD / passive-ROM exam).
   ══════════════════════════════════════════════════════════════ */
let PATIENT = {
  name:"Sample patient", sex:"male", age:57, marginalDecadeAge:90,
  metrics:{
    // ── Passive ROM exam (degrees) ──
    shoulderFlexion_deg:152, thoracicExt_deg:38, thoracicRot_deg:42,
    hipFlexion_deg:112, ankleDF_deg:34, hamstringSLR_deg:70,
    // ── Strength (VALD DynaMo / ForceDecks, body-mass normalized) ──
    shoulderER_NmKg:0.18, ohPress_xBW:0.42, grip_lb:84,
    kneeExt_xBW:0.46, beltSquat_xBW:3.4, bench_xBW:1.9,
    // ── Power / reactive ──
    cmjPower_WkG:38.2, cmjRSI:0.35, hopRSI:1.2,
    // ── Aerobic (CPET) ──
    vo2:36,
    // ── Endurance / core / balance ──
    calfRaise_reps:22, trunkExt_s:90, trunkFlex_s:45,
    balanceSL_EO_s:30, balanceSL_EC_s:14,
    // ── PCA movement tests (gym units) ──
    backSquat_pctBW:100, relDeadlift_pctBW:140, plankHeelWall_s:80, cuffExtRot_lb:17.5,
    deadHang_s:75, suitcaseCarry_pctBW:45, ohPress_pctBW:18, loadedStepup_pctBW:40, stepDown_in:16,
    // ── Research-specific tests (pROM + VALD) ──
    hipIR_deg:32, hipAbd_xBW:0.20, slHop_cm:130, kneeFlex_xBW:0.42, chinup_reps:6,
  }
};

/* ══════════════════════════════════════════════════════════════
   3) ACTIVITY CATALOG  - pure data. Team edits values, not logic.
      Each activity: 6–7 requirements across quality categories.
      basis:'confirmed' (evidence-backed threshold) | 'modeled' (drafted
      from biomechanical/performance demand, pending clinical sign-off).
      backcast:true only where a validated age/sex decline rate applies.
   ══════════════════════════════════════════════════════════════ */
const ACTIVITIES = {
 "overhead-bin":{
  name:"Manage 20 lb of overhead luggage through an airport",

  HeelToWallPlank:{male:90,female:90,group:'Hold',round:5,unit:'s',label:'Heel-to-Wall Plank'},
  CuffExtRot:{male:15,female:10,group:'Cuff',round:2.5,unit:'lb',label:'Cuff DB Ext. Rot. ×8'},
  DeadHang:{male:90,female:60,group:'Hold',round:5,unit:'s',label:'Dead Hang'},
  LoadedBench:{male:125,female:100,group:'Max',round:5,unit:'% BW',label:'Loaded Bench 1RM'},
  SingleArmOHPress:{male:20,female:15,group:'Max',round:5,unit:'% BW',label:'Single-Arm OH Press ×8'},
  SuitcaseCarry:{male:40,female:40,group:'Hold',round:5,unit:'% BW',label:'Suitcase Carry 60s'},
  LoadedStepup:{male:35,female:35,group:'Max',round:5,unit:'% BW',label:'Loaded Step-up'},
  EccentricStepDown:{male:16,female:12,group:'Ecc',round:2,unit:'in box',label:'Eccentric Step-Down'},
};
const mround=(x,m)=>Math.round(x/m)*m;
function pcaThreshold(key,sex){const t=PCA[key]; if(!t) return null;
  const base=sex==='female'?t.female:t.male, dec=clamp(Math.floor((Math.max(40,TGT)-40)/10),0,5);
  return {val:mround(base*Math.pow(1-PCA_DECLINE[t.group]/100,dec),t.round), unit:t.unit, label:t.label}; }

function shortLabel(label){ // clean, short radar-axis names
  let s=label.split('(')[0].trim()
    .replace(/Single-arm overhead press/i,'OH press')
    .replace(/Cuff DB external rotation/i,'Rotator cuff')
    .replace(/CMJ \/ drop-jump RSI/i,'Jump RSI')
    .replace(/Repeated-hop RSI/i,'Hop RSI')
    .replace(/CMJ peak power/i,'CMJ power')
    .replace(/Single-leg stance/i,'Balance')
    .replace(/Calf-raise endurance/i,'Calf endurance')
    .replace(/Straight-leg raise ROM/i,'Hamstring')
    .replace(/Shoulder external rotation/i,'Shoulder ER')
    .replace(/Hip internal rotation/i,'Hip IR')
    .replace(/Isometric knee flexion/i,'Hamstring')
    .replace(/Single-leg hop/i,'SL hop')
    .replace(/Drop-jump RSI/i,'Jump RSI')
    .replace(/\s*ROM$/i,'');
  const w=s.split(/\s+/); return w.length>2 ? w.slice(0,2).join(' ') : s;
}
/* Per-component confidence - how directly the test maps to the task's real demand.
   direct = validated measure of the demanded quality; proxy = a static/passive/related stand-in
   for a dynamic quality (passive ROM vs active-under-load, single-leg stance vs reactive balance,
   CMJ vs sit-to-stand power, isometric vs eccentric); extrapolated = target has no direct older-adult norm. */
const CONFIDENCE={
  grip_lb:'direct', vo2:'direct', backSquat_pctBW:'direct', relDeadlift_pctBW:'direct',
  loadedStepup_pctBW:'direct', suitcaseCarry_pctBW:'direct', ohPress_pctBW:'direct',
  calfRaise_reps:'direct', chinup_reps:'direct', deadHang_s:'direct', plankHeelWall_s:'direct',
  cmjPower_WkG:'proxy', cmjRSI:'proxy', hopRSI:'proxy', slHop_cm:'proxy', stepDown_in:'proxy',
  balanceSL_EO_s:'proxy', balanceSL_EC_s:'proxy', hipAbd_xBW:'proxy', cuffExtRot_lb:'proxy',
  shoulderFlexion_deg:'proxy', hipFlexion_deg:'proxy', ankleDF_deg:'proxy', thoracicRot_deg:'proxy', hamstringSLR_deg:'proxy',
  shoulderER_NmKg:'extrapolated', kneeFlex_xBW:'extrapolated'
};
const CONF_META={direct:{dot:'●',label:'direct measure'},proxy:{dot:'◐',label:'proxy measure'},extrapolated:{dot:'○',label:'extrapolated target'}};
const basisBadge=r=> r.coachSet ? `<span class="badge coachset" title="Threshold set by a coach, not derived from literature">✎ coach-set</span>` : `<span class="badge ${r.basis}">${r.basis==='confirmed'?'✔ confirmed':'~ modeled'}</span>`;
const ZICON={clear:'✓',borderline:'≈',gap:'⚠'}; // redundant (non-colour) zone cue for colour-blind safety
/* Borderline band: a value within ±10% of the bar sits inside test-retest noise - report "on the line", not pass/fail. */
const zoneOf=p=> p>=110?'clear' : p>=90?'borderline' : 'gap';
/* Projection uncertainty band: the decline rate is a population estimate with wide individual variance.
   The band applies ±40% to each quality's rate (a gentler / steeper-than-average decline), giving the
   range most individuals fall in. It widens with the projection horizon, as real uncertainty does. */
const BAND_LO=0.6, BAND_HI=1.4;

function components(reqs,intensity){
  intensity=intensity||1;
  return (reqs||[]).map(r=>{
    if(!r.metric) return null;
    const raw=PATIENT.metrics[r.metric]; if(raw==null) return null;
    let req=r.req, unit=r.unit, src=r.src;
    if(r.pcaTest){ const p=pcaThreshold(r.pcaTest,PATIENT.sex); if(p){ req=p.val; unit=p.unit; src=`PCA: ${p.label} → age-${TGT} standard`; } }
    if(req!=null) req=req*intensity;
    if(PATIENT.sex==='female' && SEX_ADJ[r.metric]) req=Math.round(req*SEX_ADJ[r.metric]);
    if(req==null) return null;
    const lower=r.dir==='lower_better';
    let projRaw,projLo,projHi;
    if(isStatic(r)){ projRaw=projLo=projHi=raw; }
    else { const aero=r.cat==='Aerobic', rate=(aero?AERO_DECLINE:declineRate(r))*SEX_DECLINE(PATIENT.sex,r.cat), acf=aero?accelAtAero:accelAt;
      projRaw=projForward(raw,rate,AGE,TGT,acf);
      projLo=projForward(raw,rate*BAND_HI,AGE,TGT,acf);   // steeper-than-average decline → lower capacity
      projHi=projForward(raw,rate*BAND_LO,AGE,TGT,acf); } // gentler-than-average → higher capacity
    const pct=v=> clamp(Math.round((lower? req/v : v/req)*100),0,175);
    const curPct=pct(raw), projPct=pct(projRaw), projPctLo=pct(projLo), projPctHi=pct(projHi);
    const meets=lower? projRaw<=req : projRaw>=req, meetsNow=lower? raw<=req : raw>=req;
    return {r,raw,projRaw,projLo,projHi,req,unit,src,short:shortLabel(r.label),
      curPct,projPct,projPctLo,projPctHi,static:isStatic(r),meetsNow,meets,zone:zoneOf(projPct),conf:CONFIDENCE[r.metric]||'proxy',shortBy:Math.max(0,100-projPct)};
  }).filter(Boolean);
}

function radarSVG(C){
  if(C.length<3) return `<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Add ≥3 measurable components to plot the radar.</div>`;
  const N=C.length,R=112,cx=215,cy=150,MAX=160, ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,p)=>[(cx+Math.cos(ang(i))*R*clamp(p,0,MAX)/MAX).toFixed(1),(cy+Math.sin(ang(i))*R*clamp(p,0,MAX)/MAX).toFixed(1)];
  const ring=p=>C.map((c,i)=>pt(i,p).join(',')).join(' ');
  const poly=k=>C.map((c,i)=>pt(i,c[k]).join(',')).join(' ');
  const pathOf=k=>'M'+C.map((c,i)=>pt(i,c[k]).join(',')).join(' L')+' Z';
  let grid='';[50,150].forEach(p=>grid+=`<polygon class="rgrid" points="${ring(p)}"/>`);
  let axes='',labels='';
  C.forEach((c,i)=>{const a=ang(i),[x,y]=pt(i,MAX);axes+=`<line class="raxis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
    const lx=cx+Math.cos(a)*(R+15),ly=cy+Math.sin(a)*(R+15),co=Math.cos(a);
    const anc=Math.abs(co)<0.30?'middle':(co>0?'start':'end');
    const w=c.short.split(' '); const lines=(c.short.length>11&&w.length>1)?[w[0],w.slice(1).join(' ')]:[c.short];
    const dy0=lines.length>1?-3:4;
    const tsp=lines.map((ln,j)=>`<tspan x="${lx.toFixed(1)}" dy="${j===0?dy0:11}">${ln}</tspan>`).join('');
    labels+=`<text class="rlabel" y="${ly.toFixed(1)}" text-anchor="${anc}">${tsp}</text>`;});
  const dots=(k,col)=>C.map((c,i)=>{const[x,y]=pt(i,c[k]);return `<circle cx="${x}" cy="${y}" r="3.3" fill="${col}"/>`;}).join('');
  return `<svg viewBox="0 0 430 300" role="img" aria-label="readiness radar">${grid}${axes}
    <polygon class="rband" points="${ring(110)}"/><polygon class="rband" points="${ring(90)}"/>
    <polygon class="rthr" points="${ring(100)}"/>
    <path class="rprojband" d="${pathOf('projPctHi')+' '+pathOf('projPctLo')}" fill-rule="evenodd"/>
    <polygon class="rproj" points="${poly('projPct')}"/><polygon class="rcur" points="${poly('curPct')}"/>
    ${dots('projPct','#bc2a2a')}${dots('curPct','#2563eb')}
    ${labels}</svg>`;
}

function barChart(C){
  const P=v=>clamp(v/175*100,0,100);
  return `<div class="bchart"><div class="bscale"><span style="left:${P(100)}%">100% = required at ${TGT}</span></div>`+
    C.map(c=>`<div class="brow">
      <div class="blabel"><span class="zico z-${c.zone}">${ZICON[c.zone]}</span><span class="bnm">${c.short}</span></div>
      <div class="btrack">
        <div class="bband" style="left:${P(90)}%;width:${(P(110)-P(90)).toFixed(1)}%"></div>
        <div class="bproj z-${c.zone}" style="width:${P(c.projPct)}%"></div>
        <div class="bthr" style="left:${P(100)}%"></div>
        <div class="bcur" style="left:${P(c.curPct)}%" title="current: ${c.curPct}% of requirement"></div>
      </div>
      <div class="bval z-${c.zone}">${c.projPct}%</div></div>`).join('')+`</div>`;
}
function statusBox(C){
  return `<div class="statusttl">Status at age ${TGT}</div>`+C.map(c=>{
    const lbl = c.zone==='clear'?'on track' : c.zone==='borderline'?'on the line' : c.shortBy+'% short';
    return `<div class="srow z-${c.zone}"><span class="zico z-${c.zone}">${ZICON[c.zone]}</span><span class="nm">${c.short}</span><span class="df">${lbl}</span></div>`;
  }).join('');
}

function cardsHTML(C){
  return `<div class="pcards">`+C.map(c=>{
    const flag=!c.meetsNow?`<div class="cap warn">⚠ Below what it needs today</div>`
      : c.zone==='gap'?`<div class="cap warn">⚠ Gap at ${TGT} · ${c.shortBy}% short</div>`
      : c.zone==='borderline'?`<div class="cap bord">≈ On the line at ${TGT}, inside test-retest noise</div>`
      : `<div class="cap ok2">✓ Clears at ${TGT}</div>`;
    const band=`<div class="band" style="left:${(90/160*100).toFixed(1)}%;width:${(20/160*100).toFixed(1)}%"></div>`;
    return `<div class="pcard z-${c.zone}">
      <div class="ct qcat ${c.r.cat}">${c.short}</div>
      <div class="big"><span class="n">${fmtU(c.raw,c.unit)}</span> now → <span class="p">${fmtU(c.projRaw,c.unit)}</span>${c.static?' (held)':' proj.'}</div>
      <div class="pbar">${band}<div class="f" style="width:${clamp(c.projPct/160*100,0,100).toFixed(0)}%"></div><div class="t" style="left:${(100/160*100).toFixed(0)}%"></div></div>
      <div class="cap">Need ${fmtU(c.req,c.unit)} · projected ${c.projPct}% of it</div>${c.static?'':`<div class="rng">illustrative range ${fmtU(c.projLo,c.unit)}–${fmtU(c.projHi,c.unit)} at ${TGT}</div>`}${flag}
      <div class="raw"><span class="cdot ${c.conf}" title="${CONF_META[c.conf].label}">${CONF_META[c.conf].dot}</span> ${CONF_META[c.conf].label} · ${c.src||''}</div>
      <div class="cardwhy">${basisBadge(c.r)} ${c.r.why} <span class="evi">${c.r.evi||''}</span></div>
    </div>`;
  }).join('')+`</div>`;
}

const SUGGEST_RULES=[
 {kw:/floor|sit and stand|\brise\b|toilet|chair|get up/i, c:[['Strength','Lower-body strength'],['Power','Rate of force to stand'],['Mobility','Hip & ankle ROM'],['Balance','Single-leg control'],['Eccentric','Controlled descent']]},
 {kw:/carry|lift|child|pet|luggage|groceries|clubs|\bload\b|\bdog\b|bags/i, c:[['Strength','Grip / hold'],['Strength','Total-body lifting'],['Core','Trunk endurance under load'],['Power','Pick-up power'],['Eccentric','Lowering control']]},
 {kw:/hike|walk|stride|sand|terrain|stairs|climb|garden/i, c:[['Aerobic','Sustained aerobic'],['Strength','Knee extension'],['Eccentric','Descent braking'],['Endurance','Calf-raise endurance'],['Balance','Uneven-surface balance']]},
 {kw:/run|jog|5 ?k|10 ?k/i, c:[['Aerobic','VO₂ max'],['Eccentric','Run durability (RSI)'],['Power','Running power'],['Strength','Knee extension'],['Endurance','Calf endurance']]},
 {kw:/swim|snorkel|scuba|surf|kayak|\brow\b|yacht|paddle/i, c:[['Aerobic','Aerobic / swim capacity'],['Strength','Upper-body pulling'],['Mobility','Shoulder ROM'],['Core','Trunk endurance'],['Endurance','Sustained output']]},
 {kw:/tennis|padel|pickleball|bowling|golf|football|kick|\bski\b|horse/i, c:[['Power','Lower-body power'],['Eccentric','Deceleration / cutting'],['Mobility','Thoracic rotation'],['Strength','Rotational / cuff strength'],['Balance','Single-leg control'],['Aerobic','Intermittent aerobic']]},
 {kw:/jar|bottle|open|packaging|weapon|handle/i, c:[['Strength','Grip / forearm'],['Strength','Shoulder stability'],['Mobility','Wrist / forearm ROM']]},
 {kw:/dance|yoga|festival|gathering|chores/i, c:[['Mobility','Multi-joint ROM'],['Balance','Dynamic balance'],['Core','Trunk endurance'],['Strength','Functional strength'],['Aerobic','Sustained low-intensity']]},
 {kw:/balance|one leg|stand/i, c:[['Balance','Single-leg stance'],['Strength','Ankle / hip stabilisers'],['Mobility','Ankle ROM']]},
 {kw:/cycle|bike/i, c:[['Aerobic','VO₂ / threshold'],['Strength','Knee extension'],['Power','Cycling power'],['Endurance','Sustained output']]},
 {kw:/bend|tie shoes|dress|reach|overhead|shelf/i, c:[['Mobility','Hip/hamstring or shoulder ROM'],['Strength','Postural / cuff strength'],['Eccentric','Controlled motion']]},
 {kw:/sexual|intimacy/i, c:[['Mobility','Hip ROM'],['Strength','Core & hip strength'],['Aerobic','Aerobic capacity'],['Balance','Positional control']]},
 {kw:/drive|car seat|transfer/i, c:[['Mobility','Trunk rotation & hip ROM'],['Strength','Grip & arm strength'],['Power','Lower-body power (CMJ)']]},
];
function suggestComponents(name){const out=[],seen=new Set();
  for(const r of SUGGEST_RULES){if(r.kw.test(name))for(const [cat,lbl] of r.c){const k=cat+lbl;if(!seen.has(k)){seen.add(k);out.push({cat,label:lbl});}}}
  return out.slice(0,7);}

const FOOT=`<div class="foot"><div class="em">Early Medical<span style="color:var(--coral)">®</span></div>
  <div class="pillars"><span>Objective</span><span class="on">Strategy</span><span>Tactics</span></div></div>`;

function renderSlide(){
  syncAge();
  const g=goalById(activeId); if(!g)return;
  const act=g.profileId?ACTIVITIES[g.profileId]:null;
  if(!act){ renderPending(g); return; }
  const C=components(act.reqs, goalIntensity[g.id]||1), qual=(act.reqs||[]).filter(r=>!r.metric);
  const missing=(act.reqs||[]).filter(r=>r.metric && PATIENT.metrics[r.metric]==null).map(r=>shortLabel(r.label));
  // Task readiness is gated by the BINDING CONSTRAINT (worst component), not a pass-count - a task fails at its weakest link.
  const worst=C.length?C.slice().sort((a,b)=>a.projPct-b.projPct)[0]:null;
  const nGap=C.filter(c=>c.zone==='gap').length, nClear=C.filter(c=>c.zone==='clear').length;
  let rWord,rCls,rCap;
  if(!C.length){rWord='—';rCls='';rCap='no measurable components yet';}
  else if(nGap){rWord='Gap';rCls='r-gap';rCap=`limited by ${worst.short} · ${worst.shortBy}% short`;}
  else if(nClear<C.length){rWord='On the line';rCls='r-bord';rCap=`closest call: ${worst.short}, within test noise`;}
  else {rWord='Clears';rCls='r-clear';rCap=`all ${C.length} components clear at ${TGT}`;}
  const total=C.length, lc=s=>s?s.charAt(0).toLowerCase()+s.slice(1):s;
  let takeaway='';
  if(total){
    const lead=`To still ${lc(g.name)} at ${TGT}, `;
    if(!nGap && nClear===total) takeaway=lead+`your projection clears <b>all ${total}</b> qualities it needs. The work here is to <b>hold</b> these, not build them.`;
    else if(!nGap) takeaway=lead+`you're on track. The closest call is <b class="tk">${worst.short}</b>, sitting right on the line and within normal test-to-test variation.`;
    else { const gaps=[...new Set(C.filter(c=>c.zone==='gap').map(c=>c.short))];
      const joinNat=a=>a.length<=1?a.join(''):a.length===2?a.join(' and '):a.slice(0,-1).join(', ')+', and '+a[a.length-1];
      takeaway=lead+(gaps.length===1
        ? `you're on track on ${nClear} of ${total} qualities. The one to train is <b class="tk">${gaps[0]}</b>, where today's habits would leave you about <b>${worst.shortBy}% short</b>.`
        : `you're on track on ${nClear} of ${total} qualities. The ones to train are <b class="tk">${joinNat(gaps)}</b>, with <b class="tk">${worst.short}</b> furthest behind at about <b>${worst.shortBy}% short</b>.`);
    }
  }
  const who=PATIENT.name?PATIENT.name+'’s ':'';
  const head=`<div class="slide-head"><div class="head-row">
      <div><div class="eyebrow">${who}Centenarian Decathlon · Functional Capacity Profile</div>
        <h1 class="slide-title">${g.name}</h1><div class="slide-sub">${act.sub||''}</div>
        <div class="intensity"><span class="ilbl">Intensity</span>${INTENSITY.map(([lbl,f])=>`<button class="ibtn ${Math.abs((goalIntensity[g.id]||1)-f)<0.01?'on':''}" data-int="${f}">${lbl}</button>`).join('')}<span class="ihint">a uniform dial that scales every requirement equally</span></div></div>
      <div class="readiness"><div class="big ${rCls}">${rWord}</div><div class="cap">${rCap}</div><div class="cap2">${nClear}/${C.length} clear at ${TGT}</div><div class="rdisc">projected scenario · not a prediction</div></div>
    </div>${takeaway?`<div class="takeaway">${takeaway}</div>`:''}</div>`;
  const body=`<div class="pv">
    ${missing.length?`<div class="missnote">⚠ No measurement entered for <b>${missing.join(', ')}</b>; ${missing.length===1?'that component is':'those components are'} not shown. Add ${missing.length===1?'it':'them'} in Build report for a complete profile.</div>`:''}
    <div class="pv-top">
      <div class="bchartwrap">${barChart(C)}
        ${C.length>=3?`<div class="radarsec">
          <div class="radarttl">Capacity shape at ${TGT}</div>
          <div class="radarwrap">${radarSVG(C)}</div>
        </div>`:''}
      </div>
      <div class="side">
        <div class="ckey">
          <span><span class="ln cur"></span>Current</span>
          <span><span class="ln proj"></span>Projected to ${TGT}</span>
          <span><span class="ln thr"></span>Required (100%)</span>
        </div>
        <div class="lbox">${statusBox(C)}</div>
      </div>
    </div>
    ${C.length?`<details class="dtl"><summary class="dtlsum">Show the numbers behind this <span class="dtlhint">${C.length} component${C.length===1?'':'s'}, current → projected</span></summary>${cardsHTML(C)}</details>`:''}
    ${qual.length?`<div class="qnote">Also coached, no numeric target: ${qual.map(q=>q.label.split('(')[0].trim()).join(' · ')}.</div>`:''}
    <div style="margin-top:16px;padding-top:11px;border-top:1px solid var(--line);font-size:11px;line-height:1.55;color:var(--muted)">
      <b style="color:var(--cream);font-weight:600">Reading this honestly.</b>
      This is a planning scenario, not a prediction; individual decline varies widely from the population averages used here.
      The <b style="color:var(--coral);font-weight:600">projected</b> line assumes you keep today’s habits; training harder bends it in your favour.
      Each requirement is a population average with a safety margin, not a hard cut-off.
      Every threshold and decline rate is drawn from published research, but the projections themselves have not been validated against real age-${TGT} outcomes. Read this as a literature-anchored estimate, not a clinical test result.
    </div>
  </div>`;
  $("#slide").innerHTML=head+body+FOOT;
  $("#legend").innerHTML='';
}

function miniRadar(C){
  if(C.length<3) return '';
  const N=C.length,R=42,cx=54,cy=50,MAX=160,ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,p)=>[(cx+Math.cos(ang(i))*R*clamp(p,0,MAX)/MAX).toFixed(1),(cy+Math.sin(ang(i))*R*clamp(p,0,MAX)/MAX).toFixed(1)];
  const poly=k=>C.map((c,i)=>pt(i,c[k]).join(',')).join(' ');
  return `<svg viewBox="0 0 108 100" class="minisvg" aria-hidden="true">
    <polygon points="${C.map((c,i)=>pt(i,100).join(',')).join(' ')}" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <polygon points="${poly('curPct')}" fill="rgba(37,99,235,.13)" stroke="#2563eb" stroke-width="1.3"/>
    <polygon points="${poly('projPct')}" fill="none" stroke="#bc2a2a" stroke-width="1.3" stroke-dasharray="3 2"/></svg>`;
}
function limiterSynthesis(goals){
  const agg={};
  goals.forEach(g=>{
    components(ACTIVITIES[g.profileId].reqs, goalIntensity[g.id]||1).forEach(c=>{
      if(c.zone==='gap'){ const k=c.short;
        (agg[k]=agg[k]||{short:c.short,cat:c.r.cat,ids:[],names:[],sev:0});
        agg[k].ids.push(g.id); agg[k].names.push(g.name); agg[k].sev+=c.shortBy; }
    });
  });
  return Object.values(agg).sort((a,b)=> b.ids.length-a.ids.length || b.sev-a.sev);
}
function qualityRollup(goals){
  const agg={};
  goals.forEach(g=>{
    components(ACTIVITIES[g.profileId].reqs, goalIntensity[g.id]||1).forEach(c=>{
      const a=(agg[c.short]=agg[c.short]||{short:c.short,cat:c.r.cat,n:0,sum:0,clears:0,gaps:0});
      a.n++; a.sum+=c.projPct; if(c.zone==='clear')a.clears++; if(c.zone==='gap')a.gaps++;
    });
  });
  return Object.values(agg).map(a=>({short:a.short,cat:a.cat,n:a.n,avg:a.sum/a.n,clears:a.clears,gaps:a.gaps}));
}
function renderOverview(){
  const goals=GOALS.filter(g=>selectedGoals.has(g.id)&&g.profileId);

    const C=components(ACTIVITIES[g.profileId].reqs, goalIntensity[g.id]||1);
    const nClear=C.filter(c=>c.zone==='clear').length, nGap=C.filter(c=>c.zone==='gap').length;
    const worst=C.slice().sort((a,b)=>a.projPct-b.projPct)[0];
    const tz=nGap?'gap':(nClear<C.length?'borderline':'clear');
    const word=nGap?'Gap':(nClear<C.length?'On the line':'Clears');
    const cap=nGap?`limited by ${worst.short}`:(nClear<C.length?`closest: ${worst.short}`:'all clear');
    return `<button class="ovcard z-${tz}" data-id="${g.id}">
      <div class="ovname">${g.name}</div>

      <div class="ovcap">${cap}</div>

  const lim=limiterSynthesis(goals), maxN=lim.length?lim[0].ids.length:1;
  const synth = lim.length ? `<div class="synth">
      <div class="synthttl">Train these to lift the most goals <span class="synthsub">shared limiters across the decathlon · tap a row to highlight its goals</span></div>

        <div class="synthbar"><div class="synthfill" style="width:${(l.ids.length/maxN*100).toFixed(0)}%"></div></div>
        <span class="synthgoals">${l.names.slice(0,3).join(', ')}${l.names.length>3?` +${l.names.length-3}`:''}</span></button>`).join('')}
    </div>` : `<div class="synth synthok">Every goal clears or sits on the line at ${TGT}. No shared training gaps.</div>`;
  const roll=qualityRollup(goals);
  const strengths=roll.filter(q=>q.gaps===0 && q.avg>=110).sort((a,b)=> b.avg-a.avg || b.clears-a.clears).slice(0,3);
  const exposures=lim.slice(0,3);
  const chips=arr=>arr.map(s=>`<span class="scq qcat ${s.cat}">${s.short}</span>`).join('');
  const scorecard=`<div class="scorecard">
    <div class="sccol up"><div class="schd"><span class="scico">✓</span><span class="scttl">Strongest</span></div>${strengths.length?`<div class="scqs">${chips(strengths)}</div><div class="scnote">comfortably above what these goals need at ${TGT}</div>`:`<div class="scnote">No standout reserves yet at ${TGT}.</div>`}</div>
    <div class="sccol dn"><div class="schd"><span class="scico">⚠</span><span class="scttl">Most exposed</span></div>${exposures.length?`<div class="scqs">${chips(exposures)}</div><div class="scnote">furthest below · these limit the most goals</div>`:`<div class="scnote">No gaps at ${TGT}; every goal clears or sits on the line.</div>`}</div>
  </div>`;
  const scope=`<div class="scope"><b>What this covers.</b> This projects physical capacity: strength, power, mobility, aerobic fitness, and balance. It does not account for disease, pain, bone density, or cognition, which can limit function just as much. Read it as one piece of the picture, not the whole of how you will function at ${TGT}.</div>`;
  $("#slide").innerHTML=`<div class="slide-head"><div class="head-row"><div>
      <div class="eyebrow">Functional Capacity Profile · at a glance</div>
      <h1 class="slide-title">${PATIENT.name?PATIENT.name+'’s ':''}Centenarian Decathlon</h1>

    <div class="pv">${scorecard}${scope}${synth}<div class="ovgrid">${cards}</div>
    <div class="ovlegend"><b style="color:var(--cream)">Reading this honestly.</b> A planning scenario, not a prediction. <span style="color:#2563eb">Blue</span> = current, <span style="color:#bc2a2a">coral dashed</span> = the no-training projection to ${TGT}, <span style="color:#059669">green ring</span> = what each goal needs. Tile colour: <b style="color:#059669">green</b> clears · <b style="color:#d97706">amber</b> on the line · <b style="color:#bc2a2a">coral</b> a gap to train.</div></div>`+FOOT;
  document.querySelectorAll('#slide .ovcard').forEach(b=>b.onclick=()=>{showOverview=false;activeId=b.dataset.id;renderCatalog();renderReportBody();});

function refRadarSVG(reqs){
  const C=(reqs||[]).filter(r=>r.metric&&r.req!=null);
  if(C.length<3) return '';
  const N=C.length,R=135,cx=280,cy=215,ang=i=>(-90+i*360/N)*Math.PI/180;
  const ringPts=f=>C.map((c,i)=>{const a=ang(i);return ((cx+Math.cos(a)*R*f).toFixed(1))+','+((cy+Math.sin(a)*R*f).toFixed(1));}).join(' ');
  let grid=''; [0.5,1].forEach(f=>grid+=`<polygon class="rgrid" points="${ringPts(f)}"/>`);
  let axes='',labels='';
  C.forEach((c,i)=>{const a=ang(i),co=Math.cos(a);
    axes+=`<line class="raxis" x1="${cx}" y1="${cy}" x2="${(cx+co*R).toFixed(1)}" y2="${(cy+Math.sin(a)*R).toFixed(1)}"/>`;
    const lx=cx+co*(R+24), ly=cy+Math.sin(a)*(R+24), anc=Math.abs(co)<0.3?'middle':(co>0?'start':'end');
    labels+=`<text class="refrlbl" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anc}"><tspan x="${lx.toFixed(1)}" fill="${CATCOLOR[c.cat]||'#39404b'}">${shortLabel(c.label)}</tspan><tspan x="${lx.toFixed(1)}" dy="14" class="refrval">${fmtU(c.req,c.unit)}</tspan></text>`;});
  return `<svg viewBox="0 0 560 430" class="refradar" role="img" aria-label="required at ${TGT}">${grid}${axes}<polygon class="refrthr" points="${ringPts(0.7)}"/>${labels}<text class="refrc1" x="${cx}" y="${(cy-3).toFixed(1)}" text-anchor="middle">Required</text><text class="refrc2" x="${cx}" y="${(cy+13).toFixed(1)}" text-anchor="middle">at ${TGT}</text></svg>`;
}

    const filled=grp.items.filter(([k])=>m[k]!=null&&m[k]!=='').length;
    return `<div class="fgroup" style="border-left-color:${groupAccent(grp.group)}"><div class="fgtitle">${grp.group}<span class="fgcount">${filled}/${grp.items.length} entered</span></div><div class="fgrid">`+
    grp.items.map(([k,lbl,unit,lo,hi])=>`<label class="fld"><span class="flbl">${lbl} <span class="funit">${unit}</span></span>
      <input type="number" step="any" class="${m[k]==null||m[k]===''?'empty':''}" data-metric="${k}" value="${m[k]??''}" placeholder="typ. ${lo}–${hi}"></label>`).join("")+
    `</div></div>`;}).join("");
  const goals=GOALS.filter(g=>g.profileId).map(g=>
    `<label class="gchk"><input type="checkbox" data-goal="${g.id}" ${selectedGoals.has(g.id)?'checked':''}><span>${g.name}</span></label>`).join("");
  $("#buildForm").innerHTML=`
    <div class="buildhead"><div><div class="eyebrow">Centenarian Decathlon</div><h1 class="slide-title">Build a patient report</h1></div>
      <div class="buildactions">
        <button class="btn" id="impBtn">Import…</button><button class="btn" id="expBtn">Export data</button>
        <button class="btn primary" id="toReport">View report →</button></div></div>
    <div class="bsec"><div class="bsectitle">Patient <span class="funit">de-identified initials or code, used to title the report (e.g. DC’s Centenarian Decathlon)</span></div>
      <div class="fgrid">
        <label class="fld"><span class="flbl">Code / initials</span><input type="text" data-pt="name" value="${PATIENT.name||''}"></label>
        <label class="fld"><span class="flbl">Sex</span><select data-pt="sex"><option value="male" ${PATIENT.sex==='male'?'selected':''}>male</option><option value="female" ${PATIENT.sex==='female'?'selected':''}>female</option></select></label>
        <label class="fld"><span class="flbl">Current age <span class="funit">years</span></span><input type="number" data-pt="age" value="${PATIENT.age}"></label>
        <label class="fld"><span class="flbl">Marginal-decade age <span class="funit">years</span></span><input type="number" data-pt="marginalDecadeAge" value="${PATIENT.marginalDecadeAge}"></label>
      </div></div>
    <div class="bsectitle measlbl">Assessment measurements</div>${fields}
    <div class="bsec"><div class="bsectitle">Goals <span class="funit" id="goalCount">${selectedGoals.size} selected</span></div>
      <div class="gchks">${goals}</div></div>
    <div class="buildsticky"><div class="bsinner"><span class="bsmeta"><b id="stickyCount">${selectedGoals.size}</b> goal${selectedGoals.size===1?'':'s'} selected · ready when you are</span><button class="btn primary" id="toReport2">View report →</button></div></div>
    <input type="file" id="impFile" accept="application/json" hidden>`;
  $("#buildForm").querySelectorAll('input[data-metric]').forEach(inp=>inp.oninput=()=>{
    const v=inp.value.trim(); PATIENT.metrics[inp.dataset.metric]= v===''?null:parseFloat(v);
    inp.classList.toggle('empty', v===''); updateGroupCount(inp.closest('.fgroup')); });
  $("#buildForm").querySelectorAll('[data-pt]').forEach(inp=>inp.oninput=()=>{
    const k=inp.dataset.pt; PATIENT[k]=(k==='age'||k==='marginalDecadeAge')?(parseInt(inp.value)||0):inp.value; syncAge(); renderChip(); });
  $("#buildForm").querySelectorAll('input[data-goal]').forEach(c=>c.onchange=()=>{
    c.checked?selectedGoals.add(c.dataset.goal):selectedGoals.delete(c.dataset.goal);
    $("#goalCount").textContent=selectedGoals.size+' selected';
    const sc=$("#stickyCount"); if(sc) sc.textContent=selectedGoals.size; });
  const toRep=()=>setTab('report');
  $("#toReport").onclick=toRep; const tr2=$("#toReport2"); if(tr2) tr2.onclick=toRep; $("#expBtn").onclick=exportData;
  $("#impBtn").onclick=()=>$("#impFile").click(); $("#impFile").onchange=importData;
}

function pageVerdict(C){
  const worst=C.length?C.slice().sort((a,b)=>a.projPct-b.projPct)[0]:null;
  const nGap=C.filter(c=>c.zone==='gap').length, nClear=C.filter(c=>c.zone==='clear').length;
  let word,cls;
  if(!C.length){word='—';cls='';} else if(nGap){word='Gap';cls='r-gap';}
  else if(nClear<C.length){word='On the line';cls='r-bord';} else {word='Clears';cls='r-clear';}
  const cap=!C.length?'no measurable components':nGap?`limited by ${worst.short} · ${worst.shortBy}% short`:nClear<C.length?`closest call: ${worst.short}`:`all ${C.length} clear at ${TGT}`;
  return {worst,nGap,nClear,word,cls,cap};
}
function pageTakeaway(g,C,v){
  const total=C.length, lc=s=>s?s.charAt(0).toLowerCase()+s.slice(1):s;
  if(!total) return '';
  const lead=`To still ${lc(g.name)} at ${TGT}, `;
  if(!v.nGap && v.nClear===total) return lead+`your projection clears <b>all ${total}</b> qualities it needs. The work here is to <b>hold</b> these, not build them.`;
  if(!v.nGap) return lead+`you're on track. The closest call is <b class="tk">${v.worst.short}</b>, sitting right on the line.`;
  const gaps=[...new Set(C.filter(c=>c.zone==='gap').map(c=>c.short))];
  const jn=a=>a.length<=1?a.join(''):a.length===2?a.join(' and '):a.slice(0,-1).join(', ')+', and '+a[a.length-1];
  return lead+(gaps.length===1
    ? `you're on track on ${v.nClear} of ${total} qualities. The one to train is <b class="tk">${gaps[0]}</b>, about <b>${v.worst.shortBy}% short</b> on today's trajectory.`
    : `you're on track on ${v.nClear} of ${total} qualities. The ones to train are <b class="tk">${jn(gaps)}</b>, with <b class="tk">${v.worst.short}</b> furthest behind (<b>${v.worst.shortBy}% short</b>).`);
}
function printFrame(pageNum,total,cls,inner){
  const who=PATIENT.name?PATIENT.name+'’s ':'';
  return `<section class="ppage ${cls}">
    <header class="phead"><div class="pbrand">Early Medical<span class="preg">®</span></div><div class="pheadr">${who}Centenarian Decathlon · Functional Capacity Profile</div></header>
    <div class="pbody">${inner}</div>
    <footer class="pfoot"><div class="ppillars"><span>Objective</span><span class="on">Strategy</span><span>Tactics</span></div><div class="pfr">Planning scenario, not a clinical prediction · page ${pageNum} of ${total}</div></footer>
  </section>`;
}
function printCompTable(C){
  return `<table class="ptbl"><thead><tr><th>Quality</th><th>Now → ${TGT}</th><th>Needs</th><th>Status</th></tr></thead><tbody>`+
    C.map(c=>`<tr class="z-${c.zone}"><td class="ptq"><span class="zico z-${c.zone}">${ZICON[c.zone]}</span> ${c.short}</td><td>${fmtU(c.raw,c.unit)} → ${fmtU(c.projRaw,c.unit)}</td><td>${fmtU(c.req,c.unit)}</td><td class="pts z-${c.zone}">${c.zone==='clear'?'on track':c.zone==='borderline'?'on the line':c.shortBy+'% short'}</td></tr>`).join('')+
    `</tbody></table>`;
}
function printGoalPage(g,pageNum,total){
  const act=ACTIVITIES[g.profileId];
  const C=components(act.reqs, goalIntensity[g.id]||1);
  const v=pageVerdict(C), tk=pageTakeaway(g,C,v);
  const qual=(act.reqs||[]).filter(r=>!r.metric);
  const inner=`<div class="pgtitle"><div><div class="pgeyebrow">Goal ${pageNum-1} of ${total-1}</div><h1 class="pgh1">${g.name}</h1>${act.sub?`<div class="pgsub">${act.sub}</div>`:''}</div>
      <div class="pgverdict ${v.cls}"><div class="pgword">${v.word}</div><div class="pgcap">${v.cap}</div><div class="pgclear">${v.nClear}/${C.length} clear at ${TGT}</div></div></div>
    ${tk?`<div class="pgtake">${tk}</div>`:''}
    <div class="pgmain">
      <div class="pgcharts"><div class="pgbars">${barChart(C)}</div>
        ${C.length>=3?`<div class="pgradar"><div class="pgrlbl">Capacity shape at ${TGT}</div>${radarSVG(C)}</div>`:''}</div>
      <div class="pgright">
        <div class="ckey"><span><span class="ln cur"></span>Current</span><span><span class="ln proj"></span>Projected to ${TGT}</span><span><span class="ln thr"></span>Required</span></div>
        ${printCompTable(C)}
        ${qual.length?`<div class="pgqnote">Also coached, no numeric target: ${qual.map(q=>q.label.split('(')[0].trim()).join(' · ')}.</div>`:''}
      </div>
    </div>`;
  return printFrame(pageNum,total,'pp-goal',inner);
}
function printSummaryPage(goals,total){
  const who=PATIENT.name?PATIENT.name+'’s ':'';
  const lim=limiterSynthesis(goals), maxN=lim.length?lim[0].ids.length:1;
  const roll=qualityRollup(goals);
  const strengths=roll.filter(q=>q.gaps===0&&q.avg>=110).sort((a,b)=>b.avg-a.avg||b.clears-a.clears).slice(0,3);
  const exposures=lim.slice(0,3);
  const chips=arr=>arr.map(s=>`<span class="scq qcat ${s.cat}">${s.short}</span>`).join('');
  const scorecard=`<div class="scorecard"><div class="sccol up"><div class="schd"><span class="scico">✓</span><span class="scttl">Strongest</span></div>${strengths.length?`<div class="scqs">${chips(strengths)}</div><div class="scnote">comfortably above what these goals need at ${TGT}</div>`:`<div class="scnote">No standout reserves yet.</div>`}</div><div class="sccol dn"><div class="schd"><span class="scico">⚠</span><span class="scttl">Most exposed</span></div>${exposures.length?`<div class="scqs">${chips(exposures)}</div><div class="scnote">furthest below · these limit the most goals</div>`:`<div class="scnote">No gaps at ${TGT}.</div>`}</div></div>`;
  const synth=lim.length?`<div class="synth"><div class="synthttl">Train these to lift the most goals <span class="synthsub">shared limiters across the decathlon</span></div>${lim.slice(0,5).map(l=>`<div class="synthrow nohover"><span class="synthq qcat ${l.cat}">${l.short}</span><span class="synthn">${l.ids.length} goal${l.ids.length===1?'':'s'}</span><div class="synthbar"><div class="synthfill" style="width:${(l.ids.length/maxN*100).toFixed(0)}%"></div></div><span class="synthgoals">${l.names.slice(0,3).join(', ')}${l.names.length>3?` +${l.names.length-3}`:''}</span></div>`).join('')}</div>`:`<div class="synth synthok">Every goal clears or sits on the line at ${TGT}.</div>`;
  const tiles=goals.map(g=>{const C=components(ACTIVITIES[g.profileId].reqs,goalIntensity[g.id]||1);const nClear=C.filter(c=>c.zone==='clear').length,nGap=C.filter(c=>c.zone==='gap').length;const tz=nGap?'gap':(nClear<C.length?'borderline':'clear');const word=nGap?'Gap':(nClear<C.length?'On the line':'Clears');return `<div class="ovcard z-${tz}"><div class="ovname">${g.name}</div><div class="ovmini">${miniRadar(C)}</div><div class="ovword z-${tz}">${ZICON[tz]} ${word}</div><div class="ovclear">${nClear}/${C.length} clear at ${TGT}</div></div>`;}).join('');
  const inner=`<div class="pgtitle"><div><div class="pgeyebrow">Functional Capacity Profile · at a glance</div><h1 class="pgh1 sumh1">${who}Centenarian Decathlon</h1><div class="pgsub">${PATIENT.sex} · age ${AGE} · marginal decade ${TGT} · ${goals.length} goals projected to ${TGT}</div></div></div>
    ${scorecard}
    ${synth}
    <div class="ovgrid sumgrid">${tiles}</div>
    <div class="scope sumscope"><b>What this covers.</b> Physical capacity only (strength, power, mobility, aerobic fitness, balance). It does not account for disease, pain, bone density, or cognition, which can limit function just as much. One piece of the picture, not the whole of how you will function at ${TGT}.</div>`;
  return printFrame(1,total,'pp-summary',inner);
}
function buildPrintDoc(){
  const goals=GOALS.filter(g=>selectedGoals.has(g.id)&&g.profileId);
  if(!goals.length) return '';
  const total=goals.length+1;
  let html=printSummaryPage(goals,total);
  goals.forEach((g,i)=>{ html+=printGoalPage(g,i+2,total); });
  return html;
}
function exportPDF(){
  const doc=buildPrintDoc();
  if(!doc){ alert('No goals in this report yet. Pick goals in Build report first.'); return; }
  const pd=$("#printDoc"); pd.innerHTML=doc;
  document.body.classList.add('printing');
  window.onafterprint=()=>{ document.body.classList.remove('printing'); pd.innerHTML=''; window.onafterprint=null; };
  window.print();
}
function exportData(){
  const custom={}; selectedGoals.forEach(id=>{ if(ACTIVITIES[id]&&ACTIVITIES[id].custom) custom[id]=ACTIVITIES[id]; });
  const data={patient:{name:PATIENT.name,sex:PATIENT.sex,age:PATIENT.age,marginalDecadeAge:PATIENT.marginalDecadeAge},metrics:PATIENT.metrics,goals:[...selectedGoals],intensity:goalIntensity,customActivities:custom};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=((PATIENT.name||'patient').replace(/[^a-z0-9]+/gi,'_'))+'_cd.json'; a.click();
}
function importData(e){
  const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(d.customActivities) for(const id in d.customActivities){ if(!ACTIVITIES[id]){ ACTIVITIES[id]=Object.assign({},d.customActivities[id],{custom:true}); GOALS.push({id,name:d.customActivities[id].name,profileId:id,custom:true}); } }
    if(d.patient) Object.assign(PATIENT,d.patient);
    if(d.metrics) Object.assign(PATIENT.metrics,d.metrics);
    if(Array.isArray(d.goals)) selectedGoals=new Set(d.goals);
    if(d.intensity) goalIntensity=Object.assign({},d.intensity);
    syncAge(); renderBuild(); renderChip();
  }catch(err){ alert('Could not read that file: '+err.message); } };
  r.readAsText(f); e.target.value='';
}

function renderChip(){
  $("#patientChip").innerHTML = tab==='reference'
    ? `<span class="meta">Reference · all activities, all requirements</span>`
    : tab==='build' ? `<span class="meta">Building report…</span>`
    : `<span class="nm">${PATIENT.name||'—'}</span><span class="meta">${PATIENT.sex} · age ${PATIENT.age} · marginal decade ${PATIENT.marginalDecadeAge}</span>`;
}

function setTab(t){
  tab=t; document.body.className='tab-'+t;
  document.querySelectorAll('#tabSeg button').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));
  renderChip();
  if(t==='reference') renderReference();
  else if(t==='build') renderBuild();
  else { renderCatalog(); renderReportBody(); }
}
$("#tabSeg").addEventListener('click',e=>{const b=e.target.closest('button'); if(b) setTab(b.dataset.tab);});
$("#slide").addEventListener('click',e=>{const b=e.target.closest('.ibtn'); if(b){ goalIntensity[activeId]=parseFloat(b.dataset.int); renderCatalog(); renderReportBody(); }});

setTab('reference');
</script>
